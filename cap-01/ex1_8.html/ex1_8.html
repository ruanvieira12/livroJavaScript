<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duração de horas de uma viagem</title>
</head>
<body>
    <script>
        const dias = Number(prompt("N° Dias:"))
        const horas = Number(prompt("N° Horas: "))
        const total = (dias * 24) + horas
        alert(`Total de horas : ${total}`)
    </script>
</body>
</html>
